name: MP2 Curriculum Map QA

on:
  pull_request:
    paths:
      - 'mp2-source-data.js'
      - 'mp2-curriculum-map.js'
      - 'mp2-compatibility.js'
      - 'mp2-curriculum-map.css'
      - 'index.html'
      - 'tests/mp2-curriculum-map.test.cjs'
      - 'tests/mp2-curriculum-map-browser.test.cjs'
      - '.github/workflows/mp2-curriculum-map.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mp2-curriculum-map-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run MP2 calculation and integration QA
        run: node tests/mp2-curriculum-map.test.cjs
      - name: Install browser test dependency
        run: |
          npm install --no-save --silent playwright >/dev/null 2>&1
          npx playwright install chromium >/dev/null 2>&1
      - name: Run MP2 browser QA
        run: node tests/mp2-curriculum-map-browser.test.cjs
