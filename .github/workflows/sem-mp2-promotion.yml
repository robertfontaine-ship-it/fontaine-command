name: SEM MP2 Promotion QA

on:
  pull_request:
    paths:
      - 'sem-mp2-promotion-packages.js'
      - 'mp2-build-progress.js'
      - 'mp2-compatibility.js'
      - 'index.html'
      - 'tests/sem-mp2-promotion.test.cjs'
      - 'tests/mp2-curriculum-map-browser.test.cjs'
      - '.github/workflows/sem-mp2-promotion.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sem-mp2-promotion-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run SEM MP2 Promotion package QA
        shell: bash
        run: |
          set -o pipefail
          node tests/sem-mp2-promotion.test.cjs 2>&1 | tee sem-mp2-promotion-qa.txt
      - name: Upload SEM Promotion QA output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sem-mp2-promotion-qa-output
          path: sem-mp2-promotion-qa.txt
