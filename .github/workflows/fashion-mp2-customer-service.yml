name: Fashion MP2 Customer Service QA

on:
  pull_request:
    paths:
      - 'fashion-mp2-customer-service-sources.js'
      - 'fashion-mp2-customer-service-packages.js'
      - 'fashion-mp2-customer-service-quality-patch.js'
      - 'index.html'
      - 'tests/fashion-mp2-customer-service.test.cjs'
      - '.github/workflows/fashion-mp2-customer-service.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fashion-mp2-customer-service-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run final Fashion MP2 package QA
        shell: bash
        run: |
          set +e
          node tests/fashion-mp2-customer-service.test.cjs > fashion-final-qa.txt 2>&1
          status=$?
          cat fashion-final-qa.txt
          exit $status
      - name: Upload final Fashion QA output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fashion-mp2-final-qa-output
          path: fashion-final-qa.txt