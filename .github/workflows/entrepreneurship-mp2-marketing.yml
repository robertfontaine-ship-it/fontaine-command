name: Entrepreneurship MP2 Marketing QA

on:
  pull_request:
    paths:
      - 'entrepreneurship-mp2-marketing-sources.js'
      - 'entrepreneurship-mp2-marketing-packages-a.js'
      - 'entrepreneurship-mp2-marketing-packages-b.js'
      - 'index.html'
      - 'tests/entrepreneurship-mp2-marketing.test.cjs'
      - '.github/workflows/entrepreneurship-mp2-marketing.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  entrepreneurship-mp2-marketing-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run Entrepreneurship MP2 Marketing Principles QA
        run: node tests/entrepreneurship-mp2-marketing.test.cjs