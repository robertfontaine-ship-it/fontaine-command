name: Entrepreneurship MP3 Activation QA

on:
  pull_request:
    paths:
      - 'entrepreneurship-mp3-activation-packages-a.js'
      - 'entrepreneurship-mp3-activation-packages-b.js'
      - 'index.html'
      - 'tests/entrepreneurship-mp3-activation.test.cjs'
      - '.github/workflows/entrepreneurship-mp3-activation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  entrepreneurship-mp3-activation-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run Entrepreneurship MP3 Business Activation QA
        run: node tests/entrepreneurship-mp3-activation.test.cjs