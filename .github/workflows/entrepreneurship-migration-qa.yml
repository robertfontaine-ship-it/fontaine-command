name: Entrepreneurship Migration QA

on:
  push:
    branches:
      - feature/entrepreneurship-migration
    paths:
      - 'entrepreneurship-source-data.js'
      - 'entrepreneurship-lesson-packages.js'
      - 'entrepreneurship-migration-audit.js'
      - 'standards-intelligence.js'
      - 'drive-sync.js'
      - 'index.html'
      - 'tests/entrepreneurship-migration.test.cjs'
      - 'tests/entrepreneurship-browser.test.cjs'
      - '.github/workflows/entrepreneurship-migration-qa.yml'
  pull_request:
    paths:
      - 'entrepreneurship-source-data.js'
      - 'entrepreneurship-lesson-packages.js'
      - 'entrepreneurship-migration-audit.js'
      - 'standards-intelligence.js'
      - 'drive-sync.js'
      - 'index.html'
      - 'tests/entrepreneurship-migration.test.cjs'
      - 'tests/entrepreneurship-browser.test.cjs'
      - '.github/workflows/entrepreneurship-migration-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  entrepreneurship-migration-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run migration calculation and integration QA
        run: node tests/entrepreneurship-migration.test.cjs
      - name: Install browser test dependency
        run: |
          npm install --no-save --silent playwright >/dev/null 2>&1
          npx playwright install chromium >/dev/null 2>&1
      - name: Run Entrepreneurship browser QA
        run: node tests/entrepreneurship-browser.test.cjs
