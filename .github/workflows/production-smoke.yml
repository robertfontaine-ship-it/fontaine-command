name: Production Smoke Test

on:
  push:
    branches:
      - feature/entrepreneurship-migration
    paths:
      - 'tests/production-smoke.test.cjs'
      - '.github/workflows/production-smoke.yml'
  pull_request:
    paths:
      - 'tests/production-smoke.test.cjs'
      - '.github/workflows/production-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deployed-site-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Playwright
        run: |
          npm install --no-save --silent playwright >/dev/null 2>&1
          npx playwright install chromium >/dev/null 2>&1
      - name: Test deployed Fontaine Command
        run: node tests/production-smoke.test.cjs
