name: Fashion MP3 Sustainability QA

on:
  pull_request:
    paths:
      - 'fashion-mp3-sustainability-sources.js'
      - 'fashion-mp3-sustainability-packages-a.js'
      - 'fashion-mp3-sustainability-packages-b.js'
      - 'index.html'
      - 'tests/fashion-mp3-sustainability.test.cjs'
      - '.github/workflows/fashion-mp3-sustainability.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fashion-mp3-sustainability-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run Fashion MP3 Sustainability QA
        run: node tests/fashion-mp3-sustainability.test.cjs