name: Curriculum Release QA

on:
  pull_request:
    paths:
      - 'index.html'
      - 'annual-review.js'
      - 'entrepreneurship-mp3-companion-resources.js'
      - 'CURRICULUM_RELEASE_STATUS.md'
      - 'PROJECT_STATUS.md'
      - 'tests/curriculum-release.test.cjs'
      - '.github/workflows/curriculum-release-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  curriculum-release-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run final curriculum release audit
        run: node tests/curriculum-release.test.cjs