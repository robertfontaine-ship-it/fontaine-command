name: AI Teacher Assistant QA

on:
  push:
    branches:
      - feature/ai-teacher-assistant
    paths:
      - 'ai-teacher-assistant.js'
      - 'ai-teacher-bridge.js'
      - 'ai-teacher-assistant.css'
      - 'mobile-qa.css'
      - 'styles.css'
      - 'index.html'
      - 'tests/ai-teacher-assistant.test.cjs'
      - 'tests/mobile-navigation.test.cjs'
      - '.github/workflows/ai-teacher-qa.yml'
  pull_request:
    paths:
      - 'ai-teacher-assistant.js'
      - 'ai-teacher-bridge.js'
      - 'ai-teacher-assistant.css'
      - 'mobile-qa.css'
      - 'styles.css'
      - 'index.html'
      - 'tests/ai-teacher-assistant.test.cjs'
      - 'tests/mobile-navigation.test.cjs'
      - '.github/workflows/ai-teacher-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  command-and-integration-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run AI Teacher Assistant command QA
        run: node tests/ai-teacher-assistant.test.cjs
      - name: Install browser test dependency
        run: |
          npm install --no-save --silent playwright >/dev/null 2>&1
          npx playwright install chromium >/dev/null 2>&1
      - name: Run mobile layout and navigation QA
        id: mobile_qa
        continue-on-error: true
        run: node tests/mobile-navigation.test.cjs > mobile-qa-output.txt 2>&1
      - name: Upload mobile QA output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-qa-output
          path: mobile-qa-output.txt
          if-no-files-found: error
      - name: Report mobile QA result
        if: always()
        run: |
          cat mobile-qa-output.txt
          test "${{ steps.mobile_qa.outcome }}" = "success"
