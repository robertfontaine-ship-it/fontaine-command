name: AI Teacher Assistant QA

on:
  push:
    branches:
      - feature/ai-teacher-assistant
    paths:
      - 'ai-teacher-assistant.js'
      - 'ai-teacher-bridge.js'
      - 'index.html'
      - 'tests/ai-teacher-assistant.test.cjs'
      - '.github/workflows/ai-teacher-qa.yml'
  pull_request:
    paths:
      - 'ai-teacher-assistant.js'
      - 'ai-teacher-bridge.js'
      - 'index.html'
      - 'tests/ai-teacher-assistant.test.cjs'
      - '.github/workflows/ai-teacher-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  command-and-integration-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run AI Teacher Assistant QA
        run: node tests/ai-teacher-assistant.test.cjs
