name: SEM MP2 Selling QA

on:
  pull_request:
    paths:
      - 'sem-mp2-selling-packages.js'
      - 'index.html'
      - 'tests/sem-mp2-selling.test.cjs'
      - '.github/workflows/sem-mp2-selling.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sem-mp2-selling-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run SEM MP2 Selling package QA
        run: node tests/sem-mp2-selling.test.cjs
