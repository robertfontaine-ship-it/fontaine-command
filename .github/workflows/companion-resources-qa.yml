name: Companion Resources QA

on:
  pull_request:
    paths:
      - 'companion-resources.js'
      - 'sem-mp2-companion-resources.js'
      - 'fashion-mp2-companion-resources.js'
      - 'entrepreneurship-mp2-companion-resources.js'
      - 'sem-mp3-companion-resources.js'
      - 'fashion-mp3-companion-resources.js'
      - 'companion-resources.css'
      - 'index.html'
      - 'tests/companion-resources.test.cjs'
      - 'tests/sem-mp2-companion-resources.test.cjs'
      - 'tests/fashion-mp2-companion-resources.test.cjs'
      - 'tests/entrepreneurship-mp2-companion-resources.test.cjs'
      - 'tests/sem-mp3-companion-resources.test.cjs'
      - 'tests/fashion-mp3-companion-resources.test.cjs'
      - 'tests/companion-resources-browser.test.cjs'
      - '.github/workflows/companion-resources-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  companion-resources-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run base companion resource calculation QA
        run: node tests/companion-resources.test.cjs
      - name: Run SEM MP2 companion resource calculation QA
        run: node tests/sem-mp2-companion-resources.test.cjs
      - name: Run Fashion MP2 companion resource calculation QA
        run: node tests/fashion-mp2-companion-resources.test.cjs
      - name: Run Entrepreneurship MP2 companion resource calculation QA
        run: node tests/entrepreneurship-mp2-companion-resources.test.cjs
      - name: Run SEM MP3 companion resource calculation QA
        run: node tests/sem-mp3-companion-resources.test.cjs
      - name: Run Fashion MP3 companion resource calculation QA
        run: node tests/fashion-mp3-companion-resources.test.cjs
      - name: Install browser test dependency
        run: |
          npm install --no-save --silent playwright >/dev/null 2>&1
          npx playwright install chromium >/dev/null 2>&1
      - name: Run companion resource browser QA
        run: node tests/companion-resources-browser.test.cjs